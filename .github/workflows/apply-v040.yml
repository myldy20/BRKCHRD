name: apply-v040-workflow

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tools/v040source/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/brkchrd-alpha'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/brkchrd-alpha
          fetch-depth: 0
      - name: Reconstruct, build, test and publish 0.4 UI
        shell: bash
        run: |
          set -euo pipefail
          test -f tools/v040source/src-00 || exit 0
          cat tools/v040source/src-* > src/sdl_main.cpp
          wc -c src/sdl_main.cpp
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsdl2-dev
          cmake -S . -B build-v040 -DCMAKE_BUILD_TYPE=Release
          cmake --build build-v040 --parallel 2
          ctest --test-dir build-v040 --output-on-failure
          set +e
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy timeout 3s build-v040/brkchrd-sdl
          status=$?
          set -e
          test "$status" -eq 0 -o "$status" -eq 124
          git config user.name 'myldy20'
          git config user.email 'myldy20@users.noreply.github.com'
          git add src/sdl_main.cpp
          git rm -r tools/v040source
          if [ -d tools/v040parts ]; then git rm -r tools/v040parts; fi
          git commit -m 'Rework performance controls for BRKCHRD 0.4'
          git push origin HEAD:agent/brkchrd-alpha
