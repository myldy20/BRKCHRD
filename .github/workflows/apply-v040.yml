name: apply-v040-workflow

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tools/v040parts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/brkchrd-alpha'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/brkchrd-alpha
          fetch-depth: 0
      - name: Reconstruct, validate and publish 0.4 UI
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f tools/v040parts/part-00 ]; then
            echo 'v040 parts already consumed'
            exit 0
          fi
          cat >/tmp/v040-parts.sha256 <<'EOF'
          f4f9c2d8a04235daf9fce37a019160d8f6dd0c8f2389c04df5b7946f3e85ce2e  tools/v040parts/part-00
          1e5d0fec96faad6a9536b42a2a54842740f134e0f1c096993055080437a2360a  tools/v040parts/part-01
          adca619db7c0b34a1f087dfef603f70eb5492c795312b1b7a66a8411c18d85dc  tools/v040parts/part-02
          5bd7e40c7194635a2339ac4d9583afe45850b9bfb64dcc16e8cb9f1a31b83909  tools/v040parts/part-03
          0b460f4ee189f978e46f521fa66a057b9cfde350d571afb461379e51e3a96cd3  tools/v040parts/part-04
          cba467f19daa8a081e7f1096139b112ce20da096d6c9a5bedb03bc9bdae7a350  tools/v040parts/part-05
          4abb35a4efeab470ef9f987d6159f69c695185767d31729f1cdf9d70e50781a0  tools/v040parts/part-06
          c4c3bed34dfb98b6ed0b030bd97f297733800d32bb71256a087a6e8d36e1f8ce  tools/v040parts/part-07
          EOF
          sha256sum -c /tmp/v040-parts.sha256
          cat tools/v040parts/part-* | base64 -d >/tmp/sdl_main.cpp
          echo 'f43224c9b8b2654741c0131d80857ef4b212605079586cb0825dfbf80141bb93  /tmp/sdl_main.cpp' | sha256sum -c -
          cp /tmp/sdl_main.cpp src/sdl_main.cpp
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsdl2-dev
          cmake -S . -B build-v040 -DCMAKE_BUILD_TYPE=Release
          cmake --build build-v040 --parallel 2
          ctest --test-dir build-v040 --output-on-failure
          set +e
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy timeout 3s build-v040/brkchrd-sdl
          status=$?
          set -e
          test "$status" -eq 0 -o "$status" -eq 124
          git config user.name 'myldy20'
          git config user.email 'myldy20@users.noreply.github.com'
          git add src/sdl_main.cpp
          git rm -r tools/v040parts
          git commit -m 'Rework performance controls for BRKCHRD 0.4'
          git push origin HEAD:agent/brkchrd-alpha
