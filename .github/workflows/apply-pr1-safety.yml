name: apply-pr1-safety

on:
  push:
    branches:
      - agent/brkchrd-060-truth-safety
    paths:
      - tools/apply-pr1.trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/brkchrd-060-truth-safety
          fetch-depth: 0
      - name: Apply safety migration
        run: python3 tools/apply_pr1_safety.py
      - name: Commit migrated sources
        run: |
          set -euo pipefail
          git config user.name 'myldy20'
          git config user.email 'myldy20@users.noreply.github.com'
          git add src/synth.cpp src/music.cpp src/sdl_main.cpp
          git diff --cached --quiet && exit 0
          git commit -m 'Harden runtime state and configuration handling'
          git push origin HEAD:agent/brkchrd-060-truth-safety
