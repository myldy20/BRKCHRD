name: sync-v030-branch

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/sync-v030-branch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/brkchrd-alpha'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/brkchrd-alpha
          fetch-depth: 0
      - name: Merge current main into product branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'myldy20'
          git config user.email 'myldy20@users.noreply.github.com'
          git fetch origin main
          git merge --no-edit origin/main
          git push origin HEAD:agent/brkchrd-alpha
