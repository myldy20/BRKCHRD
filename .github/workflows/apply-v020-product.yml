name: apply-v020-product

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/apply-v020-product.yml'
      - 'tools/v020parts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/brkchrd-alpha'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/brkchrd-alpha
          fetch-depth: 0
      - name: Persist payload fingerprints once
        shell: bash
        run: |
          set -euo pipefail
          if [ -f tools/v020-diagnostics.txt ]; then
            cat tools/v020-diagnostics.txt
            exit 0
          fi
          : > tools/v020-diagnostics.txt
          for file in tools/v020parts/part-*; do
            printf '%s=%s:%s\n' "$(basename "$file")" "$(wc -c < "$file")" "$(sha256sum "$file" | cut -d' ' -f1)" >> tools/v020-diagnostics.txt
          done
          git config user.name 'myldy20'
          git config user.email 'myldy20@users.noreply.github.com'
          git add tools/v020-diagnostics.txt
          git commit -m 'Record BRKCHRD 0.2 payload diagnostics'
          git push origin HEAD:agent/brkchrd-alpha
