name: apply-v020-product

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/apply-v020-product.yml'
      - 'tools/v020parts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/brkchrd-alpha'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/brkchrd-alpha
      - name: Print payload fingerprints
        shell: bash
        run: |
          for file in tools/v020parts/part-*; do
            printf '%s=%s:%s ' "$(basename "$file")" "$(wc -c < "$file")" "$(sha256sum "$file" | cut -d' ' -f1)"
          done
          echo
          exit 1
