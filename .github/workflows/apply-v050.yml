name: apply-v050-workflow

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tools/apply_v050.py'
      - 'tools/apply_v050.trigger*'
  workflow_dispatch:

jobs:
  diagnose:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/brkchrd-alpha'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/brkchrd-alpha
      - name: Show migration result
        shell: bash
        run: 'set +e; output=$(python3 tools/apply_v050.py 2>&1); status=$?; printf "%s\n" "$output" | tail -n 12; exit $status'
