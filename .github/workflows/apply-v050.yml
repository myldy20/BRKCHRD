name: apply-v050-workflow

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tools/apply_v050.py'
      - 'tools/apply_v050.trigger*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/brkchrd-alpha'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/brkchrd-alpha
          fetch-depth: 0
      - name: Publish BRKCHRD 0.5 migration
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/apply_v050.py
          rm -f tools/v050-migration*.log tools/v050-build*.log
          rm -f tools/apply_v050.py tools/apply_v050.trigger*
          git config user.name 'myldy20'
          git config user.email 'myldy20@users.noreply.github.com'
          git add -A
          git commit -m 'Complete BRKCHRD 0.5 smart voicing workflow'
          git push origin HEAD:agent/brkchrd-alpha
