name: apply-v050-workflow

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tools/apply_v050.py'
      - 'tools/apply_v050.trigger*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/brkchrd-alpha'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/brkchrd-alpha
          fetch-depth: 0
      - name: Apply and validate BRKCHRD 0.5
        shell: bash
        run: |
          set -u
          git config user.name 'myldy20'
          git config user.email 'myldy20@users.noreply.github.com'
          migration_diag="tools/v050-migration-${GITHUB_RUN_ID}.log"
          build_diag="tools/v050-build-${GITHUB_RUN_ID}.log"
          set +e
          python3 tools/apply_v050.py > /tmp/v050-migration.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            cp /tmp/v050-migration.log "$migration_diag"
            git add "$migration_diag"
            git commit -m 'Record BRKCHRD 0.5 migration diagnostics'
            git push origin HEAD:agent/brkchrd-alpha
            exit "$status"
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsdl2-dev
          set +e
          {
            cmake -S . -B build-v050 -DCMAKE_BUILD_TYPE=Release &&
            cmake --build build-v050 --parallel 2 &&
            ctest --test-dir build-v050 --output-on-failure &&
            sh -c 'BRKCHRD_SKIP_SPLASH=1 SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy timeout 3s build-v050/brkchrd-sdl; s=$?; test "$s" -eq 0 -o "$s" -eq 124' &&
            build-v050/brkchrd-render brkchrd-v050-demo.wav
          } > /tmp/v050-build.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 260 /tmp/v050-build.log > "$build_diag"
            git add "$build_diag"
            git commit -m 'Record BRKCHRD 0.5 build diagnostics'
            git push origin HEAD:agent/brkchrd-alpha
            exit "$status"
          fi
          rm -f tools/v050-migration*.log tools/v050-build*.log
          git add -A src/sdl_main.cpp CMakeLists.txt tools/package_portmaster.sh .github/workflows/build.yml tools
          git rm -f tools/apply_v050.py tools/apply_v050.trigger* || true
          git add -A
          git commit -m 'Complete BRKCHRD 0.5 smart voicing workflow'
          git push origin HEAD:agent/brkchrd-alpha
