name: apply-v050-workflow

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tools/apply_v050.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/brkchrd-alpha'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/brkchrd-alpha
          fetch-depth: 0
      - name: Apply and validate BRKCHRD 0.5
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/apply_v050.py
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsdl2-dev
          cmake -S . -B build-v050 -DCMAKE_BUILD_TYPE=Release
          cmake --build build-v050 --parallel 2
          ctest --test-dir build-v050 --output-on-failure
          set +e
          BRKCHRD_SKIP_SPLASH=1 SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy timeout 3s build-v050/brkchrd-sdl
          status=$?
          set -e
          test "$status" -eq 0 -o "$status" -eq 124
          build-v050/brkchrd-render brkchrd-v050-demo.wav
          git config user.name 'myldy20'
          git config user.email 'myldy20@users.noreply.github.com'
          git add src/sdl_main.cpp CMakeLists.txt tools/package_portmaster.sh .github/workflows/build.yml
          git rm tools/apply_v050.py
          git commit -m 'Complete BRKCHRD 0.5 smart voicing workflow'
          git push origin HEAD:agent/brkchrd-alpha
