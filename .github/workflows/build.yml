name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libsdl2-dev
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel 2
      - name: Run executable chord, config, input and DSP checks
        run: ctest --test-dir build --output-on-failure
      - name: Run strict exhaustive audio-path audit
        run: build/brkchrd-audio-audit audio-audit.csv --strict | tee audio-audit.log
      - name: SDL startup smoke test in English
        run: |
          set +e
          BRKCHRD_SKIP_SPLASH=1 SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy timeout 3s build/brkchrd-sdl
          status=$?
          test "$status" -eq 0 -o "$status" -eq 124
      - name: SDL startup smoke test in Russian and hold-colour mode
        run: |
          mkdir -p /tmp/brkchrd-ru
          printf 'language 1\nchorddpad 1\nuitheme 1\n' > /tmp/brkchrd-ru/brkchrd.cfg
          set +e
          XDG_CONFIG_HOME=/tmp/brkchrd-ru BRKCHRD_SKIP_SPLASH=1 SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy timeout 3s build/brkchrd-sdl
          status=$?
          test "$status" -eq 0 -o "$status" -eq 124
      - name: SDL startup smoke test for all UI palettes
        run: |
          for theme in 0 1 2 3 4; do
            dir="/tmp/brkchrd-theme-$theme"
            mkdir -p "$dir"
            printf 'uitheme %s\n' "$theme" > "$dir/brkchrd.cfg"
            set +e
            XDG_CONFIG_HOME="$dir" BRKCHRD_SKIP_SPLASH=1 SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy timeout 2s build/brkchrd-sdl
            status=$?
            set -e
            test "$status" -eq 0 -o "$status" -eq 124
          done
      - name: Render sixteen-preset demo
        run: build/brkchrd-render brkchrd-v060-demo.wav
      - name: Check documentation, localisation, palettes, branding and licensing
        run: |
          grep -q 'BRKCHRD 0.6.0' docs/manual.en.md
          grep -q 'BRKCHRD 0.6.0' docs/manual.ru.md
          grep -q 'LANGUAGE' docs/controls.en.md
          grep -q 'ЯЗЫК' docs/controls.ru.md
          grep -q 'CHORD DPAD' docs/controls.en.md
          grep -q 'DPAD АККОРД' docs/controls.ru.md
          grep -q 'UI PALETTE' docs/controls.en.md
          grep -q 'ПАЛИТРА UI' docs/controls.ru.md
          grep -q 'kUiThemes' src/sdl_main.cpp
          grep -q 'uitheme' src/sdl_main.cpp
          grep -q 'contributor' docs/hardware-test-checklist.en.md
          grep -q 'разработчик' docs/hardware-test-checklist.ru.md
          ! grep -qi 'check.*splash\|verify.*splash' docs/manual.en.md
          ! grep -qi 'провер.*застав' docs/manual.ru.md
          grep -q 'Based on BRKCHRD by Myldy design' NOTICE.md
          grep -q 'GNU GENERAL PUBLIC LICENSE' LICENSE
          test -f assets/branding/brkchrd-logo.svg
          test -f assets/branding/brkchrd-banner.jpg
          test -f packaging/portmaster/brkchrd/screenshot.jpg
          test -f packaging/portmaster/brkchrd/install_metadata.sh
          test -f packaging/nextui/tg5040/.media/BRKCHRD.png
      - uses: actions/upload-artifact@v4
        with:
          name: brkchrd-v060-audio-demo
          path: brkchrd-v060-demo.wav
      - uses: actions/upload-artifact@v4
        with:
          name: brkchrd-audio-audit
          path: |
            audio-audit.csv
            audio-audit.log

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Debug with ASan and UBSan
        run: >-
          cmake -S . -B build-sanitized
          -DCMAKE_BUILD_TYPE=Debug
          -DBRKCHRD_BUILD_SDL=OFF
          -DBRKCHRD_ENABLE_SANITIZERS=ON
      - name: Build sanitized core and tests
        run: cmake --build build-sanitized --parallel 2
      - name: Run sanitized checks
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build-sanitized --output-on-failure

  aarch64-packages:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build and package in Ubuntu 20.04 AArch64 container
        run: |
          docker run --rm \
            -v "$PWD:/src" -w /src arm64v8/ubuntu:20.04 \
            bash -ec '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends build-essential cmake pkg-config libsdl2-dev zip file
              cmake -S . -B build-aarch64 -DCMAKE_BUILD_TYPE=Release
              cmake --build build-aarch64 --parallel 2
              ctest --test-dir build-aarch64 --output-on-failure
              strip build-aarch64/brkchrd-sdl
              sh ./tools/package_portmaster.sh build-aarch64 dist
              sh ./tools/package_nextui.sh build-aarch64 dist
            '
      - name: Inspect AArch64 binary
        run: |
          file build-aarch64/brkchrd-sdl | tee /tmp/binary.txt
          grep -q 'ARM aarch64' /tmp/binary.txt
      - name: Inspect PortMaster package
        run: |
          file packaging/portmaster/brkchrd/screenshot.jpg | tee /tmp/screenshot.txt
          grep -Eq '640 ?x ?480' /tmp/screenshot.txt
          unzip -l dist/brkchrd-v0.6.0-portmaster.zip | tee /tmp/portmaster.txt
          grep -q 'BRKCHRD.sh' /tmp/portmaster.txt
          grep -q 'brkchrd/brkchrd-sdl.aarch64' /tmp/portmaster.txt
          grep -q 'brkchrd/install_metadata.sh' /tmp/portmaster.txt
          grep -q 'brkchrd/cover.jpg' /tmp/portmaster.txt
          grep -q 'brkchrd/docs/manual.en.md' /tmp/portmaster.txt
          grep -q 'brkchrd/docs/manual.ru.md' /tmp/portmaster.txt
          grep -q 'brkchrd/licenses/GPL-3.0.txt' /tmp/portmaster.txt
      - name: Inspect NextUI package
        run: |
          unzip -l dist/brkchrd-v0.6.0-nextui-tg5040.zip | tee /tmp/nextui.txt
          grep -q 'Tools/tg5040/BRKCHRD.pak/launch.sh' /tmp/nextui.txt
          grep -q 'Tools/tg5040/BRKCHRD.pak/brkchrd-sdl.aarch64' /tmp/nextui.txt
          grep -q 'Tools/tg5040/.media/BRKCHRD.png' /tmp/nextui.txt
          grep -q 'Tools/tg5040/BRKCHRD.pak/licenses/GPL-3.0.txt' /tmp/nextui.txt
      - uses: actions/upload-artifact@v4
        with:
          name: brkchrd-v060-portmaster-aarch64
          path: dist/brkchrd-v0.6.0-portmaster.zip
      - uses: actions/upload-artifact@v4
        with:
          name: brkchrd-v060-nextui-tg5040
          path: dist/brkchrd-v0.6.0-nextui-tg5040.zip
