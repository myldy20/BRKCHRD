name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate-v051:
    if: contains(github.event.head_commit.message, 'Run BRKCHRD 0.5.1 migration')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/brkchrd-alpha
          fetch-depth: 0
      - name: Apply reviewed source patch
        run: git apply --check tools/v051-ui.patch && git apply tools/v051-ui.patch
      - name: Render release artwork and install GPLv3
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin imagemagick
          mkdir -p assets/branding packaging/portmaster/brkchrd packaging/nextui/tg5040/.media
          rsvg-convert -w 1024 -h 1024 assets/branding/brkchrd-logo.svg > /tmp/brkchrd-logo.png
          convert /tmp/brkchrd-logo.png -quality 92 assets/branding/brkchrd-logo.jpg
          convert /tmp/brkchrd-logo.png -resize 600x600 -gravity center -background '#111514' -extent 1280x640 -quality 92 assets/branding/brkchrd-banner.jpg
          convert /tmp/brkchrd-logo.png -resize 440x440 -gravity center -background '#111514' -extent 640x480 -quality 92 packaging/portmaster/brkchrd/screenshot.jpg
          cp packaging/portmaster/brkchrd/screenshot.jpg packaging/portmaster/brkchrd/cover.jpg
          convert packaging/portmaster/brkchrd/cover.jpg packaging/nextui/tg5040/.media/BRKCHRD.png
          cp /usr/share/common-licenses/GPL-3 LICENSE
      - name: Publish migrated source
        run: |
          set -euo pipefail
          rm -f tools/v051-ui.patch tools/v051.trigger tools/v051.trigger2
          git checkout -- .github/workflows/build.yml
          git config user.name myldy20
          git config user.email myldy20@users.noreply.github.com
          git add -A
          git commit -m 'Polish BRKCHRD 0.5.1 interface and branding'
          git push origin HEAD:agent/brkchrd-alpha

  linux:
    if: ${{ !contains(github.event.head_commit.message, 'Run BRKCHRD 0.5.1 migration') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libsdl2-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel 2
      - name: Test chord construction and voicing
        run: ctest --test-dir build --output-on-failure
      - name: SDL startup smoke test
        run: |
          set +e
          BRKCHRD_SKIP_SPLASH=1 SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy timeout 3s build/brkchrd-sdl
          status=$?
          test "$status" -eq 0 -o "$status" -eq 124
      - name: Render sixteen-preset demo
        run: build/brkchrd-render brkchrd-v050-demo.wav
      - uses: actions/upload-artifact@v4
        with:
          name: brkchrd-v050-audio-demo
          path: brkchrd-v050-demo.wav

  portmaster-aarch64:
    if: ${{ !contains(github.event.head_commit.message, 'Run BRKCHRD 0.5.1 migration') }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build and package in Ubuntu 20.04 AArch64 container
        run: |
          docker run --rm \
            -v "$PWD:/src" -w /src arm64v8/ubuntu:20.04 \
            bash -ec '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends build-essential cmake pkg-config libsdl2-dev zip file
              cmake -S . -B build-aarch64 -DCMAKE_BUILD_TYPE=Release
              cmake --build build-aarch64 --parallel 2
              ctest --test-dir build-aarch64 --output-on-failure
              strip build-aarch64/brkchrd-sdl
              sh ./tools/package_portmaster.sh build-aarch64 dist
            '
      - name: Inspect binary and package
        run: |
          file build-aarch64/brkchrd-sdl | tee /tmp/binary.txt
          grep -q 'ARM aarch64' /tmp/binary.txt
          unzip -l dist/brkchrd-v0.5.0-portmaster.zip | tee /tmp/package.txt
          grep -q 'BRKCHRD.sh' /tmp/package.txt
          grep -q 'brkchrd/brkchrd-sdl.aarch64' /tmp/package.txt
          grep -q 'brkchrd/docs/manual.en.md' /tmp/package.txt
          grep -q 'brkchrd/docs/manual.ru.md' /tmp/package.txt
      - uses: actions/upload-artifact@v4
        with:
          name: brkchrd-v050-portmaster-aarch64
          path: dist/brkchrd-v0.5.0-portmaster.zip
