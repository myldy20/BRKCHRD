name: migrate-v052

on:
  push:
    branches:
      - agent/brkchrd-v052
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: migrate-v052-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/brkchrd-v052
          fetch-depth: 0
      - name: Apply reviewed BRKCHRD 0.5.2 migration
        run: python3 tools/migrate_v052.py
      - name: Commit source, documentation hooks and permanent CI
        run: |
          set -euo pipefail
          git config user.name myldy20
          git config user.email myldy20@users.noreply.github.com
          git add -A
          git commit -m 'Add Russian UI and hold-mode chord colours'
          git push origin HEAD:agent/brkchrd-v052
